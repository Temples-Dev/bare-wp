version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=local
      - DB_NAME=bare_wp_db
      - DB_USER=bare_wp_user
      - DB_PASSWORD=bare_wp_pass
      - DB_HOST=db
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage
    depends_on:
      - db
    networks:
      - bare_wp_network

  db:
    image: mariadb:10.11
    environment:
      - MYSQL_DATABASE=bare_wp_db
      - MYSQL_USER=bare_wp_user
      - MYSQL_PASSWORD=bare_wp_pass
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - bare_wp_network

networks:
  bare_wp_network:
    driver: bridge

volumes:
  db_data:
  storage_data:
